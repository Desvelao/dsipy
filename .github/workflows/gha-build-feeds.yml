name: Build feeds file (reusable)

on:
  workflow_call:
    inputs:
      wheel_tag:
        description: Release tag for wheel download
        required: false
        type: string
        default: "v0.0.1-alpha1"
      source_dir:
        description: Source directory used by dsipy command
        required: false
        type: string
        default: "feeds"
      feeds_limit:
        description: Limit number of states to include in the feed
        required: false
        type: number
        default: 0
      feeds_file:
        description: Output feed filename
        required: false
        type: string
        default: "feeds.rss"
      feeds_title:
        description: Feed title
        required: false
        type: string
        default: "DSI Feed"
      feeds_description:
        description: Feed description
        required: false
        type: string
        default: "DSI feed updates"
      feeds_author:
        description: Feed author
        required: false
        type: string
      feeds_email:
        description: Feed author email
        required: false
        type: string
      feed_link:
        description: Feed URL. If empty, it is generated from owner/repo + feeds_file.
        required: false
        type: string
        default: ""
      feeds_vars:
        description: Additional variables to pass to feed templates (key=value format, one per line)
        required: false
        type: string
      command_args:
        description: Additional arguments to pass to dsipy feeds build command
        required: false
        type: string
      artifact_name:
        description: Artifact name that contains the generated feed file
        required: false
        type: string
        default: "feeds-file"
    secrets:
      wheel_repo_token:
        description: Optional token with read access to wheel_repo releases
        required: false
      feeds_title:
        description: Feed title
        required: false
      feeds_description:
        description: Feed description
        required: false
      feeds_author:
        description: Feed author
        required: true
      feeds_email:
        description: Feed author email
        required: true
      feed_link:
        description: Feed URL. If empty, it is generated from owner/repo + feeds_file.
        required: false
      feeds_vars:
        description: Additional variables to pass to feed templates (key=value format, one per line)
        required: false
      sign_private_key:
        description: Private key for signing feed entries (PEM format)
        required: false
      sign_public_key:
        description: Public key for signing feed entries (PEM format)
        required: false
    outputs:
      feeds_file:
        description: Generated feed filename
        value: ${{ jobs.build.outputs.feeds_file }}
      artifact_name:
        description: Artifact name with generated feed file
        value: ${{ jobs.build.outputs.artifact_name }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      feeds_file: ${{ steps.meta.outputs.feeds_file }}
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
    env:
      WHEEL_REPO: Desvelao/dsipy
      WHEEL_TAG: ${{ inputs.wheel_tag }}
      WHEEL_ASSET: "*.whl"
      FEEDS_FILE: ${{ inputs.feeds_file }}
      ARTIFACT_NAME: ${{ inputs.artifact_name }}
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Resolve output metadata
        id: meta
        run: |
          set -euo pipefail
          echo "feeds_file=${FEEDS_FILE}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Install wheel from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.wheel_repo_token || github.token }}
        run: |
          set -euo pipefail
          mkdir -p wheel

          tag="${WHEEL_TAG}"
          if [ -z "$tag" ]; then
            tag=$(gh release view --repo "$WHEEL_REPO" --json tagName -q .tagName)
          fi

          gh release download "$tag" \
            --repo "$WHEEL_REPO" \
            --pattern "$WHEEL_ASSET" \
            --dir wheel

          wheel_file=$(find wheel -maxdepth 1 -type f -name '*.whl' | head -n 1)
          if [ -z "$wheel_file" ]; then
            echo "No wheel found in release $tag for $WHEEL_REPO matching $WHEEL_ASSET"
            exit 1
          fi

          python -m pip install --upgrade pip
          python -m pip install "$wheel_file"

      - name: Build feeds file
        run: |
          set -euo pipefail

          author="${{ secrets.feeds_author || inputs.feeds_author }}"
          email="${{ secrets.feeds_email || inputs.feeds_email }}"
          description="${{ secrets.feeds_description || inputs.feeds_description }}"
          title="${{ secrets.feeds_title || inputs.feeds_title }}"
          link="${{ secrets.feeds_link || inputs.feeds_link }}"

          gh_owner="${{ github.repository_owner }}"
          gh_owner_lower="${gh_owner,,}"
          gh_repo="${{ github.event.repository.name }}"
          gh_repo_lower="${gh_repo,,}"
          gh_pages_base_url="https://${gh_owner_lower}.github.io/${gh_repo_lower}"
          gh_repo_source_base_url="https://github.com/${gh_owner}/${gh_repo}/tree/${GITHUB_REF_NAME}"
          if [ -z "$link" ]; then
            link="${gh_pages_base_url}/${FEEDS_FILE}"
          fi

          sign_priv_flag=""
          sign_pub_flag=""
          if [ -n "${{ secrets.sign_private }}" ]; then
            sign_priv_flag="--sign-priv \"${{ secrets.sign_private_key }}\""
          fi
          if [ -n "${{ secrets.sign_public }}" ]; then
            sign_pub_flag="--sign-pub \"${{ secrets.sign_public_key }}\""
          fi

          cat <<EOF > feeds.vars
          gh_owner=${gh_owner}
          gh_repo=${gh_repo}
          gh_pages_base_url=${gh_pages_base_url}
          gh_repo_source_base_url=${gh_repo_source_base_url}
          author=${author}
          email=${email}
          EOF

          extra_vars_from_secrets='${{ secrets.feeds_vars || '' }}'
          if [ -n "$extra_vars_from_secrets" ]; then
            printf '%s\n' "$extra_vars_from_secrets" >> feeds.vars
          fi

          extra_vars_from_inputs='${{ inputs.feeds_vars || '' }}'
          if [ -n "$extra_vars_from_inputs" ]; then
            printf '%s\n' "$extra_vars_from_inputs" >> feeds.vars
          fi

          extra_command_args="${{ inputs.command_args }}"

          echo "Building ${FEEDS_FILE}"
          dsipy feeds build "${{ inputs.source_dir }}" \
            --title "$title" \
            --link "$link" \
            --description "$description" \
            --author "$author" \
            --email "$email" \
            --output "$FEEDS_FILE" \
            --limit ${{ inputs.feeds_limit }} \
            --var-file feeds.vars \
            $sign_priv_flag \
            $sign_pub_flag \
            $extra_command_args

      - name: Collect artifact
        run: |
          set -euo pipefail
          mkdir -p out

          cp "$FEEDS_FILE" "out/$FEEDS_FILE"

      - name: Upload generated feed artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: out/${{ env.FEEDS_FILE }}
          if-no-files-found: error
          retention-days: 1
