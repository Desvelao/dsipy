name: Reusable build dist

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to use for build
        required: false
        default: "3.12"
        type: string
      ref:
        description: Git ref to checkout before build (branch, tag, or SHA)
        required: false
        default: ""
        type: string
      artifact-name:
        description: Name for uploaded dist artifact
        required: false
        default: dist
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        if: ${{ inputs.ref == '' }}
        uses: actions/checkout@v4

      - name: Checkout repository (custom ref)
        if: ${{ inputs.ref != '' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build dist
        run: python -m build --outdir dist

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
